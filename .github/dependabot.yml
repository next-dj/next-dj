version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    groups:
      uv-monthly:
        patterns:
          - "*"
      uv-security:
        applies-to: security-updates
        patterns:
          - "*"
