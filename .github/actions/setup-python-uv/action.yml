name: Setup Python and uv
description: Set up Python, install uv, sync dev dependencies. Run actions/checkout before this local action.
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.12"
  django-version:
    description: Django version to install (optional, skip if empty). Overrides the locked Django for matrix jobs only.
    required: false
    default: ""
  cache:
    description: Enable uv dependency caching
    required: false
    default: "false"
  cache-key-suffix:
    description: Suffix for cache key (e.g. django-5.2-py-3.12)
    required: false
    default: ""
  install-project:
    description: Install the local next-dj project via uv sync. Set to "false" when installing from a prebuilt wheel artifact.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.2"
        enable-cache: ${{ inputs.cache == 'true' }}
        cache-suffix: ${{ inputs.cache-key-suffix }}
    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.install-project }}" = "false" ]; then
          uv sync --locked --dev --no-install-project --python ${{ inputs.python-version }}
        else
          uv sync --locked --dev --python ${{ inputs.python-version }}
        fi
    - name: Install Django ${{ inputs.django-version }} (matrix override for integration tests)
      if: inputs.django-version != ''
      shell: bash
      run: uv pip install "django==${{ inputs.django-version }}"
