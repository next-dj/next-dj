name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    uses: ./.github/workflows/test-matrix.yml
    with:
      test-command: "uv run pytest tests/ -v --junitxml=junit.xml --cov=next --cov-report=xml --cov-report=term-missing --cov-fail-under=100"
      upload-codecov: true
    secrets: inherit

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-python-uv
    - name: Lint with ruff
      run: uv run ruff check next/
    - name: Check code formatting
      run: uv run ruff format --check next/
    - name: Check import sorting
      run: uv run ruff check next/ --select I

  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-python-uv
    - name: Type check with mypy
      run: uv run mypy next/

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup-python-uv
    - name: Check for typos
      run: uv run pre-commit run typos --all-files
    - name: Check uv lock file
      run: uv run pre-commit run uv-lock --all-files

  docs:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: django.conf.global_settings
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-uv
      - name: Install docs dependencies
        run: uv sync --locked --group docs
      - name: Build documentation (fail on warnings)
        run: uv run sphinx-build -T -W --keep-going -b html docs docs/_build
      - name: Check documentation links
        run: uv run sphinx-build -b linkcheck docs docs/_build

  test-js:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
    - name: Install Node dependencies
      run: npm ci
    - name: Check TypeScript formatting (Prettier)
      run: npm run format:check
    - name: Lint TypeScript (ESLint)
      run: npm run lint:js
    - name: Build next.min.js
      run: npm run build:next
    - name: Check next.min.js is up to date
      run: git diff --exit-code next/static/next/next.min.js
    - name: Run JavaScript unit tests
      run: npm run test:js

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6
    - uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: moderate
