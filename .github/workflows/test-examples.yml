name: Test Examples

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  test-examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        django-version: ["5.2"]
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          pyproject.toml
          uv.lock
          Makefile
          examples
          .github
        sparse-checkout-cone-mode: false
    - name: Download prebuilt wheel
      uses: actions/download-artifact@v4
      with:
        name: next-dj-dist
        path: dist
    - uses: ./.github/actions/setup-python-uv
      with:
        python-version: ${{ matrix.python-version }}
        django-version: ${{ matrix.django-version }}
        cache: "true"
        cache-key-suffix: django-${{ matrix.django-version }}-py-${{ matrix.python-version }}
        install-project: "false"
    - name: Install next-dj from wheel
      run: uv pip install --no-deps --force-reinstall dist/*.whl
    - name: Run example tests
      run: make test-examples
