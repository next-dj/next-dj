name: Test Examples

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  test-examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        django-version: ["5.2"]
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          pyproject.toml
          Makefile
          examples
          .github
        sparse-checkout-cone-mode: false
    - name: Download prebuilt wheel and requirements
      uses: actions/download-artifact@v4
      with:
        name: next-dj-dist
        path: dist
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.11.2"
    - name: Create venv and install wheel + dev requirements
      run: |
        uv venv --python ${{ matrix.python-version }}
        uv pip install -r dist/requirements-dev.txt
        uv pip install --no-deps --force-reinstall dist/*.whl
    - name: Install Django ${{ matrix.django-version }}
      run: uv pip install "django==${{ matrix.django-version }}"
    - name: Run example tests
      env:
        PYTEST: ${{ github.workspace }}/.venv/bin/pytest
      run: make test-examples
