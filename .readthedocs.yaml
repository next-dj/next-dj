version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_install:
      - python -m pip install --upgrade "uv==0.11.2"
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --frozen --no-dev --group docs --link-mode=copy

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  - pdf
